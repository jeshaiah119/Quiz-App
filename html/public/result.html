<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="stylesheet" href="public/css/style.css">

</head>
<body>

<div class="result-container">

    <div class="result-card">

        <h1>🏆 Quiz Completed</h1>

        <div class="score-circle">

            <span id="percentage">
                0%
            </span>

        </div>

        <h2 id="status">
            Loading...
        </h2>

        <p id="message">
            Calculating Result...
        </p>

        <div class="result-details">

            <p>
                Subject:
                <strong id="subjectName"></strong>
            </p>

            <p>
                Score:
                <strong id="scoreText"></strong>
            </p>

        </div>

        <div class="result-buttons">

            <button
                class="main-btn"
                id="retryBtn">

                Retake Quiz

            </button>

            <button
                class="dashboard-btn"
                id="dashboardBtn">

                Dashboard

            </button>

        </div>

    </div>

</div>

<script src="public/js/result.js"></script>

</body>
</html>
