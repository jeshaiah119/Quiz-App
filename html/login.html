<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizSphere</title>
   <link rel="stylesheet" href="public/css/style.css">

</head>
<body>

    <!-- Animated Background -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="container">

        <div class="left-panel">
            <div class="left-content">
                <h1>🧠 QuizSphere</h1>

                <p>
                    Learn, Challenge Yourself, and Track Your Progress
                    across multiple subjects.
                </p>

                <ul>
                    <li>✔ 8 Quiz Categories</li>
                    <li>✔ 160+ Questions</li>
                    <li>✔ Progress Tracking</li>
                    <li>✔ Instant Results</li>
                </ul>
            </div>
        </div>

        <div class="right-panel">

            <div class="auth-box">

                <div class="tabs">
                    <button id="loginBtn" class="active">
                        Login
                    </button>

                    <button id="registerBtn">
                        Register
                    </button>
                </div>

                <!-- LOGIN FORM -->

                <form id="loginForm">

                    <h2>Welcome Back</h2>

                    <input
                        type="text"
                        id="loginUsername"
                        placeholder="Username"
                        required
                    >

                    <div class="password-box">

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Password"
                            required
                        >

                        <span class="togglePassword">👁</span>

                    </div>

                    <button
                        type="submit"
                        class="main-btn"
                    >
                        Login
                    </button>

                </form>

                <!-- REGISTER FORM -->

                <form
                    id="registerForm"
                    class="hidden"
                >

                    <h2>Create Account</h2>

                    <input
                        type="text"
                        id="registerUsername"
                        placeholder="Username"
                        required
                    >

                    <input
                        type="email"
                        id="registerEmail"
                        placeholder="Email Address"
                        required
                    >

                    <div class="password-box">

                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Password"
                            required
                        >

                        <span class="togglePassword">👁</span>

                    </div>

                    <div class="password-box">

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm Password"
                            required
                        >

                        <span class="togglePassword">👁</span>

                    </div>

                    <button
                        type="submit"
                        class="main-btn"
                    >
                        Register
                    </button>

                </form>

                <!-- FOOTER -->

                <div class="footer">
                    © 2026 QuizSphere |
                    Learn • Practice • Achieve
                </div>

            </div>

        </div>

    </div>

    <script src="public/js/auth.js"></script>

</body>
</html>
