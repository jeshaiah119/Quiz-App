<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizSphere Quiz</title>
<link rel="stylesheet" href="public/css/style.css">
</head>
<body>

<div class="quiz-container">

    <div class="quiz-header">

        <h2 id="subjectTitle">
            Quiz
        </h2>

        <span id="questionCounter">
            Question 1 / 20
        </span>

    </div>

    <div class="progress-container">

        <div class="timer-container">
    ⏱ Time Left:
    <span id="timer">30</span>s
</div>

        <div
            class="progress-bar"
            id="progressBar">
        </div>

    </div>

    <div class="quiz-card">

        <h3 id="questionText">
            Loading...
        </h3>

        <div
            id="optionsContainer"
            class="options">
        </div>

        <div
            id="feedback"
            class="feedback">
        </div>

        <button
            id="nextBtn"
            class="main-btn"
            style="display:none;">
            Next Question
        </button>
         <button
            id="submitBtn"
            class="main-btn"
            style="display:block;">
            Submit
        </button>

    </div>

</div>

<script src="public/js/quiz.js"></script>

</body>
</html>
